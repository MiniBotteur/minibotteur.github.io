<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Jeu 2</title>

<style>
body {
  margin:0;
  overflow:hidden;
  background:#111;
}

canvas {
  display:block;
}
</style>
</head>

<body>

<!-- Bouton Jouer -->
<button id="startBtn" style="
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  padding:20px 40px;
  font-size:28px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  z-index:20;
">
  Jouer
</button>

<!-- Bouton Menu (invisible au début) -->
<button id="menuBtn" style="
  position:absolute;
  top:20px;
  left:20px;
  padding:10px 20px;
  font-size:18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  z-index:20;
  display:none;
">
  Menu
</button>

<canvas id="gameCanvas"></canvas>

<script src="js_game2.js"></script>

</body>
</html>
